# PostgreSQL configuration
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: tu_app_development
  username: postgres  # o tu_usuario_postgres
  host: localhost
  port: 5432

test:
  <<: *default
  database: tu_app_test
  username: postgres  # o tu_usuario_postgres
  host: localhost
  port: 5432

production:
  <<: *default
  database: tu_app_production
  # Para producción, usa variables de entorno:
  # username: <%= ENV['DATABASE_USERNAME'] %>
  # password: <%= ENV['DATABASE_PASSWORD'] %>
  # host: <%= ENV['DATABASE_HOST'] %>